<!-- templates/index.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GPT Sampler — Web Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; margin: 0; padding: 0; height: 100vh; display: flex; }
    .col { padding: 16px; box-sizing: border-box; }
    .left { width: 40%; border-right: 1px solid #ddd; }
    .right { flex: 1; overflow: auto; }
    textarea { width: 100%; height: 200px; font-family: monospace; font-size: 14px; padding: 8px; }
    .controls { margin-top: 8px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .controls input[type=number], .controls input[type=text] { width: 90px; padding:6px; }
    button { padding:8px 12px; cursor:pointer; }
    .output { white-space: pre-wrap; font-family: monospace; padding: 12px; }
    .row { margin-bottom: 12px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
    .label { font-size: 12px; color:#666; margin-bottom:6px; display:block; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid #ccc; border-top-color:#333; border-radius:50%; animation:spin 1s linear infinite; vertical-align:middle; margin-left:8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="col left">
    <h2>Input</h2>
    <textarea id="prompt" placeholder="Type a prompt and press Generate...">To be, or not to be</textarea>

    <div class="controls">
      <label class="label">Lines <input id="lines" type="number" value="5" min="1" /></label>
      <label class="label">Samples <input id="samples" type="number" value="5" min="1" /></label>
      <label class="label">Tokens <input id="tokens" type="number" value="30" min="1" /></label>
      <label class="label">Temp <input id="temperature" type="text" value="0.8" /></label>
      <label class="label">Top-k <input id="top_k" type="number" value="200" min="1" /></label>
    </div>

    <div style="margin-top:12px;">
      <button id="generate">Generate</button>
      <span id="status" style="margin-left:12px"></span>
    </div>
    <div style="margin-top:18px; font-size:13px; color:#666">
      This UI sends your prompt to the Flask server which runs the model and returns generated text. Each line contains <em>samples</em> joined by the literal "<strong>&lt;eot&gt;</strong>".
    </div>
  </div>

  <div class="col right">
    <h2>Generated output</h2>
    <div id="output" class="output"></div>
  </div>

<script>
document.getElementById('generate').addEventListener('click', async () => {
  const prompt = document.getElementById('prompt').value;
  const lines = parseInt(document.getElementById('lines').value || "5");
  const samples = parseInt(document.getElementById('samples').value || "5");
  const tokens = parseInt(document.getElementById('tokens').value || "30");
  const temperature = parseFloat(document.getElementById('temperature').value || "0.8");
  const top_k = parseInt(document.getElementById('top_k').value || "200");

  const status = document.getElementById('status');
  const out = document.getElementById('output');
  out.innerText = "";
  status.innerHTML = 'Generating <span class="spinner"></span>';

  try {
    const resp = await fetch('/api/generate', {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, lines, samples, tokens, temperature, top_k })
    });
    const json = await resp.json();
    if (!resp.ok) {
      out.innerText = "Error: " + (json.error || resp.statusText);
      status.innerText = "Error";
      return;
    }
    // json.results is array of lines, each is many samples joined with "<eot>"
    out.innerText = "";
    json.results.forEach((line, idx) => {
      out.innerText += `Line ${idx+1}:\n${line}\n\n`;
    });
    status.innerText = "Done";
  } catch (e) {
    out.innerText = "Request failed: " + e.toString();
    status.innerText = "Failed";
  }
});
</script>
</body>
</html>
